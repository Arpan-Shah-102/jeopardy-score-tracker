<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Jeopardy Score Tracker</title>
        <link rel="stylesheet" href="./style.css">
        <link rel="icon" type="image/x-icon" href="./assets/favicon.png">
    </head>
    <body>
        <h1>Jeopardy Score Tracker</h1>
        <h2>0</h2>
        <div class="big-div">
            <div>
                <button class="reset type">⟲</button>
                <button value="increment" class="add type selected">+</button>
                <button value="decrement" class="subtract type">-</button>
            </div>
            <div>
                <button value="100" class="scale num s100 selected">100</button>
                <button value="200" class="scale num s200">200</button>
                <button value="300" class="scale num s300">300</button>
                <button value="400" class="scale num s400">400</button>
                <button value="500" class="scale num s500">500</button>
            </div>
        </div>
        <p class="mute bottom-icon"><abbr title="Volume On">🔊</abbr></p>
        <p class="help bottom-icon"><abbr title="Help">?</abbr></p>
        <script src="./script.js"></script>
    </body>
</html>
